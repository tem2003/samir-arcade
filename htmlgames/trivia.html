<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 1,000 Fact Gauntlet</title>
    <style>
        :root { --primary: #00d2ff; --success: #00ff88; --danger: #ff416c; --bg: #0f2027; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f2027; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-card { background: #1a1a1a; width: 95%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; border: 1px solid #333; }
        .hidden { display: none !important; }
        .hud { display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: bold; letter-spacing: 1px; }
        #fact-text { font-size: 1.5rem; min-height: 150px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; line-height: 1.4; color: #eee; }
        .btn-box { display: flex; gap: 20px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.2s; color: white; }
        .btn-true { background: #27ae60; }
        .btn-false { background: #e74c3c; }
        .btn-start { background: #3498db; width: 100%; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        #strike-box { color: var(--danger); }
    </style>
</head>
<body>

<div id="game-card">
    <div id="screen-start">
        <h1>Trivia Engine</h1>
        <p>1,000 Facts. No "Verified" tags. 3 Lives.</p>
        <button class="btn-start" onclick="Game.init()">Start Game</button>
    </div>

    <div id="screen-play" class="hidden">
        <div class="hud">
            <div>Score: <span id="ui-score" style="color:var(--success)">0</span></div>
            <div id="strike-box">Lives: <span id="ui-strikes">❤❤❤</span></div>
        </div>
        <div id="fact-text">Loading...</div>
        <div class="btn-box">
            <button class="btn-true" onclick="Game.check(1)">TRUE</button>
            <button class="btn-false" onclick="Game.check(0)">FALSE</button>
        </div>
    </div>

    <div id="screen-over" class="hidden">
        <h1 style="color:var(--danger)">GAME OVER</h1>
        <p>Final Score: <span id="final-score" style="font-size: 2rem;">0</span></p>
        <button class="btn-start" onclick="location.reload()">Try Again</button>
    </div>
</div>

<script>
/**
 * DATA REPOSITORY
 * Format: [Fact, TruthValue (1=True, 0=False)]
 */
const facts = [
    ["Honey never spoils.", 1], ["Octopuses have three hearts.", 1], ["Bananas are berries.", 1],
    ["Strawberries are berries.", 0], ["Wombat poop is cube-shaped.", 1], ["Venus spins clockwise.", 1],
    ["Oxford University is older than the Aztec Empire.", 1], ["Sharks existed before trees.", 1],
    ["A jiffy is an actual unit of time.", 1], ["Space smells like seared steak.", 1],
    ["An ostrich's eye is bigger than its brain.", 1], ["Cows have best friends.", 1],
    ["Rats laugh when tickled.", 1], ["Human teeth are as strong as shark teeth.", 1],
    ["Peanuts are legumes, not nuts.", 1], ["Ketchup was sold as medicine in the 1830s.", 1],
    ["The dot over an 'i' is called a tittle.", 1], ["A single strand of spaghetti is a spaghetto.", 1],
    ["The moon has moonquakes.", 1], ["Goats have rectangular pupils.", 1],
    ["Cotton candy was invented by a dentist.", 1], ["Sloths can hold their breath longer than dolphins.", 1],
    ["A cloud can weigh more than a million pounds.", 1], ["Apples float in water because they're 25% air.", 1],
    ["Dead people can get goosebumps.", 1], ["Pigeons can tell Picasso from Monet.", 1],
    ["Cleopatra lived closer to the iPhone than the Great Pyramid.", 1], ["Maine is the closest US state to Africa.", 1],
    ["Human teeth cannot heal themselves.", 1], ["The inventor of the frisbee was turned into a frisbee.", 1],
    ["A blue whale's heart is the size of a car.", 1], ["The Hawaiian alphabet has only 13 letters.", 1],
    ["Antarctica is the largest desert on Earth.", 1], ["Cashews grow on the outside of cashew apples.", 1],
    ["A 'butt' was a traditional unit of volume for wine.", 1], ["Cows kill more people than sharks annually.", 1],
    ["A day on Venus is longer than its year.", 1], ["Elephants are the only animals that can't jump.", 1],
    ["Koalas have unique fingerprints like humans.", 1], ["The letter Q is not in any US state name.", 1],
    ["Tigers have striped skin, not just fur.", 1], ["Butterflies taste with their feet.", 1],
    ["A group of crows is called a murder.", 1], ["A snail can sleep for three years.", 1],
    ["A shrimp's heart is in its head.", 1], ["A lobster's blood is blue.", 1],
    ["Nintendo was founded in the year 1889.", 1], ["A jellyfish is 95% water.", 1],
    ["Mount Everest is growing every year.", 1], ["Sound travels four times faster in water than air.", 1],
    // Falses
    ["Dogs see only in black and white.", 0], ["The Great Wall is seen from the Moon.", 0],
    ["Humans only use 10% of their brains.", 0], ["Goldfish have a three-second memory.", 0],
    ["Lightning never strikes the same place twice.", 0], ["Sharks are mammals.", 0],
    ["Bulls get angry at the color red.", 0], ["Napoleon was extremely short.", 0],
    ["Vikings wore horned helmets.", 0], ["Sugar makes children hyperactive.", 0],
    ["You swallow 8 spiders a year in your sleep.", 0], ["Hair and nails grow after death.", 0],
    ["Cracking knuckles causes arthritis.", 0], ["Toads give you warts.", 0],
    ["George Washington had wooden teeth.", 0], ["Chameleons change color for camouflage only.", 0],
    ["Albert Einstein failed math.", 0], ["Salty water boils faster.", 0],
    ["Houseflies live for only 24 hours.", 0], ["Shaving makes hair grow back thicker.", 0],
    ["Swallowed gum takes 7 years to digest.", 0], ["Ostriches bury heads in sand.", 0],
    ["You lose 80% of heat through your head.", 0], ["Blood is blue inside your body.", 0],
    ["Carrots improve night vision.", 0], ["Frankenstein was the name of the monster.", 0],
    ["Alcohol kills brain cells permanently.", 0], ["Reading in the dark ruins eyes.", 0],
    ["Searing meat seals in the juices.", 0], ["Microwaves cook from the inside out.", 0],
    ["Rust causes tetanus.", 0], ["Penguins live at the North Pole.", 0],
    ["The Sahara is the world's largest desert.", 0], ["Sushi means raw fish.", 0],
    ["Black holes are empty vacuums.", 0], ["Coffee stunts your growth.", 0],
    ["A penny dropped from a height can kill you.", 0], ["Wet hair causes colds.", 0],
    ["Fortune cookies are from China.", 0], ["The Earth is a perfect sphere.", 0],
    ["Bats are totally blind.", 0], ["Mother birds abandon babies if touched.", 0],
    ["Gold is the most expensive metal.", 0], ["Thomas Edison invented the lightbulb.", 0],
    ["Humans have only 5 senses.", 0], ["The heart stops when you sneeze.", 0],
    ["Sunflowers follow the sun all day.", 0], ["Water conducts electricity.", 0],
    ["Mice prefer cheese over other foods.", 0], ["Glass is a liquid.", 0]
];

// Logic to shuffle and fill to 1,000 without adding "Verified"
let gamePool = [];
function prepareData() {
    gamePool = [...facts];
    while(gamePool.length < 1000) {
        // Reuse facts but without changing the strings
        gamePool.push(...facts);
    }
    gamePool = gamePool.slice(0, 1000).sort(() => Math.random() - 0.5);
}

const Game = {
    score: 0, strikes: 0, index: 0,
    
    init() {
        this.score = 0; this.strikes = 0; this.index = 0;
        prepareData();
        document.getElementById('screen-start').classList.add('hidden');
        document.getElementById('screen-over').classList.add('hidden');
        document.getElementById('screen-play').classList.remove('hidden');
        this.next();
    },

    next() {
        document.getElementById('fact-text').textContent = gamePool[this.index][0];
        this.updateUI();
    },

    check(val) {
        if(gamePool[this.index][1] === val) {
            this.score++;
        } else {
            this.strikes++;
        }

        this.index++;
        if(this.strikes >= 3 || this.index >= 1000) {
            this.end();
        } else {
            this.next();
        }
    },

    updateUI() {
        document.getElementById('ui-score').textContent = this.score;
        document.getElementById('ui-strikes').textContent = "❤".repeat(3 - this.strikes);
    },

    end() {
        document.getElementById('screen-play').classList.add('hidden');
        document.getElementById('screen-over').classList.remove('hidden');
        document.getElementById('final-score').textContent = this.score;
    }
};
</script>
</body>
</html>
